name: Publish to PyPI

# Triggers when a version tag is pushed: git tag v0.9.0 && git push --tags
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  # Required for PyPI Trusted Publisher (OIDC) — no API token needed.
  id-token: write

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies (libcurl)
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev libssl-dev

      - name: Build wheel and sdist
        run: |
          pip install build
          python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/rtsp-curl/
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      # Uses PyPI Trusted Publisher (OIDC) — configure at:
      # https://pypi.org/manage/project/rtsp-curl/settings/publishing/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-testpypi:
    name: Publish to TestPyPI (dry-run)
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/rtsp-curl/
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
